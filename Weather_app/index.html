<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="header">
      <div class="searchBar">
        <div class="search">
          <label>
            <input type="text"  id="input" placeholder="Enter Location" />
          </label>
        </div>
        <div class="searchButton">
          <button id="searchBtn">Search</button>
        </div>
      </div>
    </div>
    <div>
      <div class="weatherData">
        <div class="temperature">
          <p>39&deg</p>
        </div>

        <div class="location">
          <div class="city">
            <p>Delhi</p>
          </div>
          <span class="time">12:15</span>

          <span class="day">Friday</span>

          <span class="date">2026-01-30</span>
        </div>

    <div class="status">
        <div class="icon">
          <img src="./sun.png" id="icon" alt="weather_status_image" />
        </div>
        <div class="condition">sunny</div>
    </div>
    </div>
    </div>

    <footer class="footer">
      <p>Made by Yashvardhan | January 2026</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
