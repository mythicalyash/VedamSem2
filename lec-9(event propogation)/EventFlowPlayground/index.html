<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Flow Playground</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Event Flow Playground</h1>
        <p>Demonstrating Capturing, Bubbling & Propagation Control</p>
    </header>

    <main class="container">
        <div class="section">
            <div class="grandparent" id="grandparent">
                <div class="label">Grandparent</div>
                <div class="parent" id="parent">
                    <div class="label">Parent</div>
                    <button class="child" id="child">Click Me</button>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="logHeader">
                <h2>Event Log</h2>
                <button id="clearLog">Clear</button>
            </div>
            <div id="eventLog" class="eventLog"></div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
